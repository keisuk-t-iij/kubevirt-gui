apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  creationTimestamp: null
  name: build-ubuntu
spec:
  running: false
  instancetype:
    name: u1.small
  template:
    metadata:
      creationTimestamp: null
    spec:
      domain:
        devices: {}
        resources: {}
      terminationGracePeriodSeconds: 180
      volumes:
      - name: ubuntu-vm-root
        persistentVolumeClaim:
          claimName: ubuntu-vm-root
      - name: ubuntu-vm-data
        persistentVolumeClaim:
          claimName: ubuntu-vm-data
      - name: dv-ubuntu
        persistentVolumeClaim:
          claimName: dv-ubuntu
      - cloudInitNoCloud:
          secretRef:
            name: build-ubuntu
        name: cloudinitdisk

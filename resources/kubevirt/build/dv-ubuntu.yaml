apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: "dv-ubuntu"
spec:
  source:
    http:
      url: "https://cloud-images.ubuntu.com/minimal/releases/jammy/release-20240715/ubuntu-22.04-minimal-cloudimg-amd64.img"
  pvc:
    storageClassName: hpe-standard01
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: "4Gi"

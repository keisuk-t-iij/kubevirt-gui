apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stubl9
  labels:
    app: containerized-data-importer
  annotations:
    cdi.kubevirt.io/storage.import.endpoint: "http://hop-boot-master.thop.2iij.net/stubl9//latest/stubl9.qcow2"
spec:
  storageClassName: hpe-standard01
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi

apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  creationTimestamp: null
  name: ike-vmimage
spec:
  instancetype:
    name: u1.small
  preference:
    inferFromVolume: ubuntu-2204-ike
    inferFromVolumeFailurePolicy: Ignore
  runStrategy: Always
  template:
    metadata:
      creationTimestamp: null
    spec:
      domain:
        devices: {}
        resources: {}
      terminationGracePeriodSeconds: 180
      volumes:
      - name: ubuntu-2204-ike
        persistentVolumeClaim:
          claimName: ubuntu-2204-ike
      - cloudInitNoCloud:
          userDataBase64: 
        name: cloudinitdisk
      - name: secretvolume
        secret:
          secretName: org
status: {}

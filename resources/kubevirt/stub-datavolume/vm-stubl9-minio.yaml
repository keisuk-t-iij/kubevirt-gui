apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    kubevirt.io/vm: stubl9
  name: stubl9-minio
spec:
  running: false
  template:
    metadata:
      annotations:
        "cni.projectcalico.org/ipv4pools": "[\"svc-ike-hop-ippool\"]"
      labels:
        os: stubl9
    spec:
      terminationGracePeriodSeconds: 30
      domain:
        resources:
          requests:
            memory: 4096M
        devices:
          disks:
          - disk:
              bus: virtio
            name: disk0
          - disk:
              bus: virtio
            name: cloudinitdisk
      volumes:
      - dataVolume:
          name: dv-stubl9-minio
        name: disk0
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |-
            #cloud-config
            network:
              version: 2
              ethernets:
                eth0:
                  dhcp4: true

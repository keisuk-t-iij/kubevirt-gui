apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  creationTimestamp: null
  name: rocky9-secondary-cluster
spec:
  instancetype:
    name: u1.small
  runStrategy: Always
  template:
    metadata:
      creationTimestamp: null
    spec:
      domain:
        devices:
          interfaces:
          - name: default
            masquerade: {}
          - name: secondary
            bridge: {}
        resources: {}
      networks:
      - name: default
        pod: {}
      - name: secondary
        multus:
          networkName: secondary-cluster
      terminationGracePeriodSeconds: 180
      volumes:
      - containerDisk:
          image: ikr.iij.jp/virt/rocky-int:9
        name: rocky-containerdisk-0

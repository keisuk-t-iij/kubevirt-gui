apiVersion: v1
kind: Service
metadata:
  annotations:
    k8s.ovn.org/egress-service: ""
  labels:
    app: nginx
  name: nginx
spec:
  allocateLoadBalancerNodePorts: true
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - port: 80
  selector:
    app: nginx
  type: LoadBalancer
